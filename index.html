<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MelodyBox | Glassmorphism Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar glass">
            <h2 class="logo">MelodyBox</h2>
            <nav>
                <ul>
                    <li class="active"><i class="fas fa-home"></i> Home</li>
                    <li><i class="fas fa-search"></i> Search</li>
                    <li><i class="fas fa-heart"></i> Favorites</li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <div class="search-bar glass">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search artists, songs...">
                </div>
            </header>

            <section class="song-section">
                <h1>Recommended for you</h1>
                <div id="song-list" class="song-grid">
                    <div class="song-card glass">
                        <img src="https://via.placeholder.com/150" alt="Cover">
                        <h4>Song Title</h4>
                        <p>Artist Name</p>
                    </div>
                </div>
            </section>
        </main>

        <footer class="player-bar glass">
            <div class="current-track">
                <img id="track-art" src="https://via.placeholder.com/50" alt="Art">
                <div class="track-info">
                    <h4 id="track-name">Select a Song</h4>
                    <p id="track-artist">-</p>
                </div>
            </div>

            <div class="controls">
                <div class="buttons">
                    <i class="fas fa-random"></i>
                    <i class="fas fa-step-backward"></i>
                    <i class="fas fa-play-circle" id="masterPlay"></i>
                    <i class="fas fa-step-forward"></i>
                    <i class="fas fa-redo"></i>
                </div>
                <input type="range" class="progress-bar" id="progressBar" value="0">
            </div>

            <div class="volume-box">
                <i class="fas fa-volume-up"></i>
                <input type="range" id="volume" value="80">
            </div>
        </footer>
    </div>

</body>
</html>
